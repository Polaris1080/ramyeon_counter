name: ramyeon_counter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  darq: ^2.1.0
  go_router: ^17.2.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3: ^2.9.4
  sqflite_common_ffi: ^2.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  

flutter:
  uses-material-design: true
  fonts:
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/Zen_Kaku_Gothic_New/ZenKakuGothicNew-Light.ttf
          weight: 300
        - asset: assets/fonts/Zen_Kaku_Gothic_New/ZenKakuGothicNew-Regular.ttf
          weight: 400
        - asset: assets/fonts/Zen_Kaku_Gothic_New/ZenKakuGothicNew-Medium.ttf
          weight: 500
        - asset: assets/fonts/Zen_Kaku_Gothic_New/ZenKakuGothicNew-Bold.ttf
          weight: 700
        - asset: assets/fonts/Zen_Kaku_Gothic_New/ZenKakuGothicNew-Black.ttf
          weight: 900 
    - family: ZenMaruGothic
      fonts:
        - asset: assets/fonts/Zen_Maru_Gothic/ZenMaruGothic-Light.ttf
          weight: 300
        - asset: assets/fonts/Zen_Maru_Gothic/ZenMaruGothic-Regular.ttf
          weight: 400
        - asset: assets/fonts/Zen_Maru_Gothic/ZenMaruGothic-Medium.ttf
          weight: 500
        - asset: assets/fonts/Zen_Maru_Gothic/ZenMaruGothic-Bold.ttf
          weight: 700
        - asset: assets/fonts/Zen_Maru_Gothic/ZenMaruGothic-Black.ttf
          weight: 900
